          if (svg && className) {

          }
        }

                              <td className="p-4 font-semibold text-blue-700">IPD 分離式矽電容</td>
                              <td className="p-4 text-slate-600">Murata (村田)、Empower</td>
                              <td className="p-4 text-slate-700">
                                <b>深溝槽密度極限：</b>傳統被動元件大廠的製程多非前段半導體製程。愛普的 Gen4 技術能達到 3.8 μF/mm² 的高電容密度，且具備多 Chiplet <span className="bg-blue-100 text-blue-800 px-1 rounded">Reticle-stitching (接合曝光)</span> 量產能力。
                              </td>
                            </tr>
                            <tr className="hover:bg-slate-50 transition-colors">
                              <td className="p-4 font-semibold text-indigo-700">VHM 垂直記憶體</td>

                              <td className="p-4 text-slate-700">
                                <b>差異化賽道：</b>不與 HBM 拚「訓練(Training)」市場的絕對容量，而是鎖定「推理(Inference)」市場的<span className="bg-indigo-100 text-indigo-800 px-1 rounded">低功耗與超低延遲</span>。客製化 SoC 的 ASIC 業者更傾向採用 VHM 作為替代方案。
                              </td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                    </div>

                    <div>
                      <h3 className="text-xl font-bold flex items-center gap-2 mb-6 border-b border-slate-100 pb-2">
                        <Icon name="pie-chart" className="w-6 h-6 text-emerald-500" />
                        潛在市場 (TAM) 擴張與產能實證
                      </h3>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-slate-800 text-white rounded-xl p-6 shadow-md">
                          <h4 className="text-emerald-400 font-bold mb-4 flex items-center gap-2">
                            <Icon name="database" className="w-5 h-5" /> 力積電 IPD 產能備援
                          </h4>
                          <p className="text-slate-300 text-sm mb-4 leading-relaxed">
                            根據力積電 2026/04 法說會證實，應用於 EMIB 的先進封裝 IPD 產品已獲國際大廠認證並即將小量備貨。這為愛普的 IPD 提供了潛在的產能出海口。
                          </p>
                          
                          <div className="bg-slate-700/60 border border-slate-600 rounded-xl p-5 mt-2">
                            <p className="text-xs font-bold text-slate-400 text-center mb-4 uppercase tracking-wider">實際晶粒產出當量對比 (Die Output Ratio)</p>
                            <div className="space-y-5">
                              <div>
                                <div className="flex justify-between items-end mb-1.5">
                                  <span className="text-sm font-bold text-slate-200">8 吋廠 (月投片 3,000 片)</span>
                                  <span className="text-xs text-emerald-400 font-bold bg-emerald-900/50 px-2 py-0.5 rounded">1x 基準當量</span>
                                </div>
                                <div className="w-full bg-slate-800 h-4 rounded-full overflow-hidden shadow-inner border border-slate-600">
                                  <div className="bg-emerald-500 h-full transition-all duration-1000" style={{ width: '40%' }}></div>
                                </div>
                              </div>
                              <div>
                                <div className="flex justify-between items-end mb-1.5">
                                  <span className="text-sm font-bold text-slate-200">12 吋廠 (月投片 3,000 片)</span>
                                  <span className="text-xs text-blue-400 font-bold bg-blue-900/50 px-2 py-0.5 rounded">2.25x 產能躍升</span>
                                </div>
                                <div className="w-full bg-slate-800 h-4 rounded-full overflow-hidden shadow-inner border border-slate-600">
                                  <div className="bg-blue-500 h-full transition-all duration-1000 flex items-center justify-end pr-3" style={{ width: '90%' }}>
                                     <span className="text-[9px] text-white font-bold opacity-90">面積效益倍增</span>
                                  </div>
                                </div>
                              </div>
                            </div>
                            <p className="text-[10px] text-slate-400 mt-4 leading-relaxed text-center">
                              * 12 吋晶圓面積約為 8 吋的 2.25 倍。在相同投片量下，12 吋產能若順利開出將帶來顯著的規模經濟。
                            </p>
                          </div>
                        </div>

                        <div className="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
                          <h4 className="text-slate-800 font-bold mb-4 flex items-center gap-2">
                            <Icon name="target" className="w-5 h-5 text-blue-500" /> 客戶結構與潛在路徑
                          </h4>
                          <div className="space-y-4">
                            <div className="flex items-start gap-3 p-3 bg-blue-50 rounded-lg border border-blue-100">
                              <div className="bg-blue-500 text-white p-1.5 rounded mt-0.5"><Icon name="check-circle" className="w-4 h-4" /></div>
                              <div>
                                <div className="font-bold text-slate-800 text-sm">階段一：矽中介層導入 (已達成)</div>
                                <div className="text-xs text-slate-600 mt-1">IPC 成功打入美系雲端大咖 ASIC 晶片，隨 CoWoS-S 放量。</div>
                              </div>
                            </div>
                            <div className="flex items-start gap-3 p-3 bg-indigo-50 rounded-lg border border-indigo-100">
                              <div className="bg-indigo-500 text-white p-1.5 rounded mt-0.5"><Icon name="zap" className="w-4 h-4" /></div>
                              <div>
                                <div className="font-bold text-slate-800 text-sm">階段二：嵌入基板與次世代封裝</div>
                                <div className="text-xs text-slate-600 mt-1">IPD 鎖定 EMIB / CoWoS-L 等架構，有機會分散單一客戶與單一技術路線風險。</div>
                              </div>
                            </div>
                            <div className="flex items-start gap-3 p-3 bg-amber-50 rounded-lg border border-amber-100">

                                <div className="text-xs text-slate-600 mt-1">與合作夥伴佈局 IVR 領域，期盼在未來的系統級電源架構中擴大滲透率。</div>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {activeTab === 'risks' && (
                  <div className="space-y-6 animate-in fade-in duration-500">
                    <p className="text-slate-600 mb-6">高報酬往往伴隨挑戰，投資愛普科技需持續追蹤以下三大潛在風險指標：</p>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      <div className="bg-white border border-amber-200 rounded-xl p-6 relative overflow-hidden group">

                      <div className="bg-white border border-rose-200 rounded-xl p-6 relative overflow-hidden group">

                        <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2 relative z-10">
                          <Icon name="zap-off" className="w-5 h-5 text-rose-500" />
                          測試產能與轉廠瓶頸
                        </h3>
                        <p className="text-slate-600 text-sm leading-relaxed relative z-10">
                          2026 年初 IoT RAM 與 ApSRAM 需求受限於後段測試產能。此外，力積電銅鑼廠 (P5) 出售造成 IPC 部分後段製程交期延遲，雖公司評估影響有限，仍為短期執行風險。
                        </p>
                      </div>

                      <div className="bg-white border border-slate-200 rounded-xl p-6 relative overflow-hidden group">
                         <div className="absolute top-0 right-0 w-16 h-16 bg-slate-100 rounded-bl-full -mr-8 -mt-8 transition-transform group-hover:scale-110"></div>
                        <h3 className="font-bold text-slate-800 mb-3 flex items-center gap-2 relative z-10">
                          <Icon name="shield" className="w-5 h-5 text-slate-500" />
                          記憶體景氣反轉壓力
                        </h3>
                        <p className="text-slate-600 text-sm leading-relaxed relative z-10">
                          目前受惠於傳統 DRAM 短缺與漲價的外溢效應。但若記憶體景氣反轉，加上代工成本(力積電)上升無法順利轉嫁，將直接侵蝕 IoT RAM 的毛利與出貨量。
                        </p>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="text-center mt-12 mb-8">
               <p className="text-sm text-slate-400 mb-2">免責聲明：本報告數據基於法人預估與 2026 最新公開資訊，僅供學術研究，不構成投資建議。</p>
            </div>
          </main>
        </div>
      );
    }
    
    // 初始化 React 應用
